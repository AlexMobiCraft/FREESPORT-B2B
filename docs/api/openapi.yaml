openapi: 3.1.0
info:
  title: FREESPORT API
  version: 1.0.0
  x-logo:
    url: https://api.freesport.ru/static/logo.png
    altText: FREESPORT API
  description: RESTful API для B2B/B2C платформы спортивных товаров FREESPORT
paths:
  /health/:
    get:
      operationId: health_retrieve
      description: Проверка состояния API сервера
      summary: Health Check
      tags:
      - System
      security:
      - {}
      responses:
        '200':
          description: API работает корректно
  /monitoring/metrics/operations/:
    get:
      operationId: monitoring_metrics_operations_retrieve
      description: Возвращает метрики операций за указанный период (по умолчанию последние
        24 часа)
      summary: Получить метрики операций синхронизации
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
        description: Конец периода (ISO 8601 формат)
      - in: query
        name: start_date
        schema:
          type: string
        description: Начало периода (ISO 8601 формат)
      tags:
      - Monitoring
      responses:
        '200':
          description: Метрики операций успешно получены
  /monitoring/metrics/business/:
    get:
      operationId: monitoring_metrics_business_retrieve
      description: Возвращает бизнес-метрики за указанный период
      summary: Получить бизнес-метрики синхронизации
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
        description: Конец периода (ISO 8601 формат)
      - in: query
        name: start_date
        schema:
          type: string
        description: Начало периода (ISO 8601 формат)
      tags:
      - Monitoring
      responses:
        '200':
          description: Бизнес-метрики успешно получены
  /monitoring/metrics/realtime/:
    get:
      operationId: monitoring_metrics_realtime_retrieve
      description: Возвращает метрики за последние 5 минут
      summary: Получить метрики в реальном времени
      tags:
      - Monitoring
      responses:
        '200':
          description: Метрики в реальном времени получены
  /monitoring/health/:
    get:
      operationId: monitoring_health_retrieve
      description: Возвращает текущий статус всех компонентов системы интеграции
      summary: Получить статус здоровья системы
      tags:
      - Monitoring
      responses:
        '200':
          description: Статус системы успешно получен
  /subscribe/:
    post:
      operationId: subscribe_create
      description: Подписывает пользователя на email-рассылку о новинках и акциях.
        Если email уже подписан - возвращает нейтральный 200 OK.
      summary: Подписка на email-рассылку
      tags:
      - Newsletter
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
            examples:
              SuccessfulSubscriptionRequest:
                value:
                  email: user@example.com
                  pdp_consent: true
                summary: successful_subscription_request
        required: true
      security:
      - {}
      responses:
        '200':
          description: Запрос на подписку обработан; новый и уже подписанный email
            возвращают одинаковый успех
        '400':
          description: Ошибка валидации (email или pdp_consent)
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscribeConsentPersistenceErrorResponse'
              examples:
                ConsentPersistenceFailed:
                  value:
                    error: consent_persistence_failed
                    details:
                      non_field_errors:
                      - Не удалось сохранить согласие. Попробуйте позже.
                  summary: consent_persistence_failed
          description: Согласие не удалось сохранить, подписка откатана
  /unsubscribe/:
    post:
      operationId: unsubscribe_create
      description: Обрабатывает запрос на отписку от email-рассылки. Для неизвестного
        или уже отписанного email возвращает такой же нейтральный 200 OK.
      summary: Отписка от email-рассылки
      tags:
      - Newsletter
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnsubscribeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UnsubscribeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UnsubscribeRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: Запрос на отписку обработан
        '400':
          description: Ошибка валидации email
        '503':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnsubscribeProcessingErrorResponse'
              examples:
                UnsubscribeProcessingFailed:
                  value:
                    error: unsubscribe_processing_failed
                    details:
                      non_field_errors:
                      - Не удалось обработать запрос. Попробуйте позже.
                  summary: unsubscribe_processing_failed
          description: Запрос на отписку не удалось обработать из-за ошибки БД
  /news/:
    get:
      operationId: news_list
      description: Возвращает список опубликованных новостей с пагинацией. Новости
        отсортированы по дате публикации (новые первые).
      summary: Получить список новостей
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
        description: 'Номер страницы (по умолчанию: 1)'
      - in: query
        name: page_size
        schema:
          type: integer
        description: 'Количество новостей на странице (по умолчанию: 10, макс: 100)'
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - News
      security:
      - {}
      responses:
        '200':
          description: Список новостей успешно получен
  /news/{slug}/:
    get:
      operationId: news_retrieve
      description: "\n    Возвращает детальную информацию о новости по её slug.\n\n\
        \    Доступны только опубликованные новости (is_published=True)\n    с датой\
        \ публикации <= текущего момента.\n\n    Возвращает 404, если новость не найдена\
        \ или не опубликована.\n    "
      summary: Получить детальную информацию о новости
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - News
      security:
      - {}
      responses:
        '200':
          description: Детальная информация о новости
        '404':
          description: Новость не найдена или не опубликована
  /blog/:
    get:
      operationId: blog_list
      description: Возвращает список опубликованных статей блога с пагинацией. Статьи
        отсортированы по дате публикации (новые первые).
      summary: Получить список статей блога
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: page
        schema:
          type: integer
        description: 'Номер страницы (по умолчанию: 1)'
      - in: query
        name: page_size
        schema:
          type: integer
        description: 'Количество статей на странице (по умолчанию: 10, макс: 100)'
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Blog
      security:
      - {}
      responses:
        '200':
          description: Список статей блога успешно получен
  /blog/{slug}/:
    get:
      operationId: blog_retrieve
      description: "\n    Возвращает детальную информацию о статье блога по её slug.\n\
        \n    Доступны только опубликованные статьи (is_published=True)\n    с датой\
        \ публикации <= текущего момента.\n\n    Возвращает 404, если статья не найдена\
        \ или не опубликована.\n    "
      summary: Получить детальную информацию о статье блога
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - Blog
      security:
      - {}
      responses:
        '200':
          description: Детальная информация о статье блога
        '404':
          description: Статья не найдена или не опубликована
  /auth/register/:
    post:
      operationId: auth_register_create
      description: Создание нового пользователя с указанием роли (retail, wholesale_level1-3,
        trainer, federation_rep)
      summary: Регистрация пользователя
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserRegistrationRequest'
        required: true
      security:
      - {}
      responses:
        '201':
          description: Пользователь успешно зарегистрирован
        '400':
          description: Ошибки валидации
  /auth/login/:
    post:
      operationId: auth_login_create
      description: Аутентификация пользователя и получение JWT токенов
      summary: Вход пользователя
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserLoginRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: Успешная аутентификация
        '400':
          description: Ошибки аутентификации
        '403':
          description: Аккаунт ожидает верификации
  /auth/logout/:
    post:
      operationId: auth_logout_create
      description: |-
        Инвалидация refresh токена через blacklist механизм.

        После успешного logout refresh токен больше не может быть использован для получения новых access токенов. Access токен остаётся валидным до истечения срока действия (short-lived).

        Все события logout логируются с audit trail информацией: user_id, username, timestamp (ISO 8601), IP address.
      summary: Logout пользователя
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
      responses:
        '204':
          description: Logout успешен, токен добавлен в blacklist
        '400':
          description: Невалидный или истёкший refresh токен
        '401':
          description: Пользователь не аутентифицирован
  /auth/refresh/:
    post:
      operationId: auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /auth/password-reset/:
    post:
      operationId: auth_password_reset_create
      description: Отправка email с ссылкой для сброса пароля. Всегда возвращает 200
        OK (security best practice).
      summary: Запрос на сброс пароля
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetRequestRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: Email отправлен (если пользователь существует)
  /auth/password-reset/validate-token/:
    post:
      operationId: auth_password_reset_validate_token_create
      description: Проверка валидности токена перед сбросом пароля
      summary: Валидация токена сброса пароля
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateTokenRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ValidateTokenRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ValidateTokenRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: Токен валиден
        '404':
          description: Токен не найден
        '410':
          description: Токен истёк
  /auth/password-reset/confirm/:
    post:
      operationId: auth_password_reset_confirm_create
      description: Установка нового пароля после валидации токена
      summary: Подтверждение сброса пароля
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: Пароль успешно изменён
        '400':
          description: Ошибки валидации
        '404':
          description: Токен не найден
        '410':
          description: Токен истёк
  /users/profile/:
    get:
      operationId: users_profile_retrieve
      description: Получение данных профиля текущего авторизованного пользователя
      summary: Получение профиля пользователя
      tags:
      - Users
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
        '401':
          description: Пользователь не авторизован
    put:
      operationId: users_profile_update
      description: Просмотр и обновление профиля текущего пользователя
      tags:
      - users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserProfileRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: users_profile_partial_update
      description: Частичное обновление данных профиля пользователя (PATCH)
      summary: Обновление профиля пользователя
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
        '400':
          description: Ошибки валидации
        '401':
          description: Пользователь не авторизован
  /users/profile/dashboard/:
    get:
      operationId: users_profile_dashboard_retrieve
      description: Возвращает основные метрики и статистику пользователя
      summary: Получение дашборда пользователя
      tags:
      - users
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDashboard'
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /users/company/:
    get:
      operationId: users_company_retrieve
      description: Возвращает реквизиты компании для B2B пользователя
      summary: Получение реквизитов компании
      tags:
      - Users
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
    put:
      operationId: users_company_update
      description: Обновляет реквизиты компании для B2B пользователя
      summary: Обновление реквизитов компании
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
              description: Unspecified request body
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: {}
              description: Unspecified request body
          multipart/form-data:
            schema:
              type: object
              additionalProperties: {}
              description: Unspecified request body
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
        '401':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
                description: Unspecified response body
          description: ''
  /users/orders/:
    get:
      operationId: users_orders_list
      description: Получение истории заказов пользователя с пагинацией
      summary: История заказов
      tags:
      - Users
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderHistory'
          description: ''
  /users/roles/:
    get:
      operationId: users_roles_retrieve
      description: Получение списка доступных ролей пользователей в системе
      summary: Информация о ролях пользователей
      tags:
      - Users
      security:
      - {}
      responses:
        '200':
          description: Список ролей пользователей
  /users/addresses/:
    get:
      operationId: users_addresses_list
      description: ViewSet для управления адресами пользователя
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Users
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAddressList'
          description: ''
    post:
      operationId: users_addresses_create
      description: ViewSet для управления адресами пользователя
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddressRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AddressRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
          description: ''
  /users/addresses/{id}/:
    patch:
      operationId: users_addresses_partial_update
      description: ViewSet для управления адресами пользователя
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Адрес.
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAddressRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAddressRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAddressRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
          description: ''
    delete:
      operationId: users_addresses_destroy
      description: ViewSet для управления адресами пользователя
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Адрес.
        required: true
      tags:
      - Users
      responses:
        '204':
          description: No response body
    put:
      operationId: users_addresses_update
      description: ViewSet для управления адресами пользователя
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Адрес.
        required: true
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddressRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AddressRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
          description: ''
    get:
      operationId: users_addresses_retrieve
      description: ViewSet для управления адресами пользователя
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this Адрес.
        required: true
      tags:
      - Users
      responses:
        '200':
