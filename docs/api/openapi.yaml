      description: Serializer для категорий с поддержкой иерархии
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название
          maxLength: 200
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
          title: Описание
        image:
          type: string
          format: uri
          title: Изображение
        icon:
          type: string
          format: uri
          title: Иконка
        parent:
          type:
          - integer
          - 'null'
          title: Родительская категория
        children:
          type: string
          readOnly: true
        products_count:
          type: string
          readOnly: true
        breadcrumbs:
          type: string
          readOnly: true
        is_active:
          type: boolean
          title: Активная
        sort_order:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Порядок сортировки
      required:
      - breadcrumbs
      - children
      - id
      - name
      - products_count
      - slug
    CategoryTree:
      type: object
      description: Специальный serializer для дерева категорий (корневые категории)
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название
          maxLength: 200
        slug:
          type: string
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        image:
          type: string
          format: uri
          title: Изображение
        icon:
          type: string
          format: uri
          title: Иконка
        children:
          type: string
          readOnly: true
        products_count:
          type: integer
          readOnly: true
        in_stock_count:
          type: integer
          readOnly: true
        sort_order:
          type: integer
          maximum: 2147483647
          minimum: 0
          title: Порядок сортировки
      required:
      - children
      - id
      - in_stock_count
      - name
      - products_count
      - slug
    DeliveryMethod:
      type: object
      description: Сериализатор для способа доставки.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          readOnly: true
          title: Название
        description:
          type: string
          readOnly: true
          title: Описание
        icon:
          type: string
          readOnly: true
          title: Иконка
          description: CSS класс иконки или emoji для UI
        is_available:
          type: boolean
