  /banners/:
    get:
      operationId: banners_list
      description: |-
        Возвращает список активных баннеров для текущего пользователя.

        Фильтрация:
        - Только активные баннеры (is_active=True)
        - В пределах дат показа (start_date/end_date)
        - По роли пользователя из JWT токена или гость
        - По типу баннера через ?type=hero|marketing

        Сортировка: по приоритету (DESC)
      summary: Получить активные баннеры
      parameters:
      - in: query
        name: type
        schema:
          type: string
          enum:
          - hero
          - marketing
        description: 'Фильтр по типу баннера: hero или marketing'
      tags:
      - Banners
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Banner'
              examples:
                SuccessExample:
                  value:
                  - - id: 1
                      type: hero
                      title: Новая коллекция 2025
                      subtitle: Эксклюзивные новинки для профессионалов
                      image_url: /media/promos/2025/01/hero.webp
                      mobile_image_url: ''
                      image_alt: Баннер новой коллекции
                      cta_text: Перейти в каталог
                      cta_link: /catalog
                    - id: 2
                      type: marketing
                      title: Специальные цены для оптовиков
                      subtitle: Скидки до 30% на весь ассортимент
                      image_url: /media/promos/2025/01/wholesale.webp
                      mobile_image_url: /media/promos/2025/01/wholesale_mobile.webp
                      image_alt: Баннер оптовых цен
                      cta_text: Узнать больше
                      cta_link: /wholesale
                  summary: Успешный ответ
                  description: Список активных баннеров для пользователя
          description: ''
  /api/integration/1c/exchange/:
    get:
      operationId: api_integration_1c_exchange_retrieve
      tags:
      - api
      responses:
        '200':
          description: No response body
    post:
      operationId: api_integration_1c_exchange_create
      description: |-
        Handle POST requests.
        Some 1C configurations send checkauth or init via POST.
        Also handles file uploads (mode=file).
      tags:
      - api
      responses:
        '200':
          description: No response body
components:
  schemas:
    Address:
      type: object
      description: Serializer для адресов пользователя
      properties:
        id:
          type: integer
          readOnly: true
        address_type:
          allOf:
          - $ref: '#/components/schemas/AddressTypeEnum'
          title: Тип адреса
        full_name:
          type: string
          title: Полное имя получателя
          maxLength: 100
        phone:
          type: string
          title: Телефон
          maxLength: 12
        city:
          type: string
          title: Город
          maxLength: 100
        street:
          type: string
          title: Улица
          maxLength: 200
        building:
          type: string
          title: Дом
          maxLength: 10
        apartment:
          type: string
          title: Квартира/офис
          maxLength: 10
        postal_code:
          type: string
          title: Почтовый индекс
          maxLength: 6
        is_default:
          type: boolean
          title: Адрес по умолчанию
        full_address:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Дата создания
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: Дата обновления
      required:
      - building
      - city
      - created_at
      - full_address
      - full_name
      - id
      - phone
      - postal_code
      - street
      - updated_at
    AddressRequest:
      type: object
      description: Serializer для адресов пользователя
      properties:
        address_type:
          allOf:
          - $ref: '#/components/schemas/AddressTypeEnum'
          title: Тип адреса
        full_name:
          type: string
          minLength: 1
          title: Полное имя получателя
          maxLength: 100
        phone:
          type: string
          minLength: 1
          title: Телефон
          maxLength: 12
        city:
          type: string
          minLength: 1
          title: Город
          maxLength: 100
        street:
          type: string
          minLength: 1
          title: Улица
          maxLength: 200
        building:
          type: string
          minLength: 1
          title: Дом
          maxLength: 10
        apartment:
          type: string
          title: Квартира/офис
          maxLength: 10
        postal_code:
          type: string
          minLength: 1
          title: Почтовый индекс
          maxLength: 6
        is_default:
          type: boolean
          title: Адрес по умолчанию
      required:
      - building
      - city
      - full_name
      - phone
      - postal_code
      - street
    AddressTypeEnum:
      enum:
      - shipping
      - legal
      type: string
      description: |-
        * `shipping` - Адрес доставки
        * `legal` - Юридический адрес
    AttributeFilter:
      type: object
      description: |-
        Serializer для атрибутов в фильтрах каталога.

        Возвращает список активных атрибутов с их значениями для построения
        фильтров в каталоге товаров.

        Fields:
        - id: ID атрибута
        - name: Название атрибута
        - slug: URL-совместимый идентификатор
        - values: Список значений атрибута
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название атрибута
          description: Название типа свойства (например, 'Цвет', 'Размер', 'Материал')
          maxLength: 255
        slug:
          type: string
          description: URL-совместимый идентификатор
          maxLength: 255
          pattern: ^[-a-zA-Z0-9_]+$
        values:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: |-
            Получить все значения атрибута.

            Args:
                obj: Attribute instance

            Returns:
                List[dict]: Список значений атрибута
          readOnly: true
      required:
      - id
      - name
      - slug
      - values
    Banner:
      type: object
      description: |-
        Сериализатор баннера для публичного API

        Возвращает данные для отображения баннера в Hero-секции главной страницы
      properties:
        id:
          type: integer
          readOnly: true
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          readOnly: true
          title: Тип баннера
          description: |-
            Тип определяет место и способ отображения баннера

            * `hero` - Геройский (Hero)
            * `marketing` - Маркетинговый
        title:
          type: string
          readOnly: true
          title: Заголовок
          description: Основной заголовок баннера
        subtitle:
          type: string
          readOnly: true
          title: Подзаголовок
          description: Дополнительный текст под заголовком
        image_url:
          type: string
          description: |-
            Получить URL изображения баннера

            Возвращает относительный путь для совместимости с SSR
            (избегаем проблем с internal Docker hostnames)

            Args:
                obj: Объект баннера

            Returns:
                Относительный URL изображения или пустая строка
          readOnly: true
        mobile_image_url:
          type: string
          description: |-
            Получить URL мобильного изображения баннера

            Args:
                obj: Объект баннера

            Returns:
                Относительный URL мобильного изображения или пустая строка
          readOnly: true
        image_alt:
          type: string
          readOnly: true
          title: Alt-текст изображения
          description: Alt-текст для accessibility
        cta_text:
          type: string
          readOnly: true
          title: Текст кнопки
          description: Текст call-to-action кнопки
        cta_link:
          type: string
          readOnly: true
          title: Ссылка кнопки
          description: URL для перехода по клику
      required:
      - cta_link
      - cta_text
      - id
      - image_alt
      - image_url
      - mobile_image_url
      - subtitle
      - title
      - type
    Brand:
      type: object
      description: Serializer для брендов
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Название бренда
          maxLength: 100
        slug:
          type: string
          pattern: ^[-a-zA-Z0-9_]+$
        image:
          type:
          - string
          - 'null'
          description: Возвращает URL изображения или None.
          readOnly: true
        description:
          type: string
          title: Описание
        website:
          type: string
          format: uri
          title: Веб-сайт
          maxLength: 200
        is_featured:
          type: boolean
          title: Показывать на главной
      required:
      - id
      - image
      - name
    Cart:
      type: object
      description: Serializer для корзины с полной информацией
      properties:
        id:
          type: integer
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
          readOnly: true
        total_items:
          type: string
          readOnly: true
        total_amount:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          title: Дата создания
        updated_at:
          type: string
          format: date-time
          readOnly: true
          title: Дата обновления
      required:
      - created_at
      - id
      - items
      - total_amount
      - total_items
      - updated_at
    CartItem:
      type: object
      description: |-
        Serializer для элемента корзины с ценовой информацией.
        Работает с ProductVariant вместо Product.
      properties:
        id:
          type: integer
          readOnly: true
        variant_id:
          type: integer
          title: Вариант товара
          description: SKU-вариант товара с конкретными характеристиками (цвет, размер)
          readOnly: true
        product:
          type: object
          additionalProperties: {}
          description: Получить информацию о товаре
          readOnly: true
        variant:
          type: object
          additionalProperties: {}
          description: Получить информацию о варианте
          readOnly: true
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 1
          title: Количество
        unit_price:
          type: string
          description: Получить цену из снимка
          readOnly: true
        total_price:
          type: number
          format: double
          description: Стоимость этого элемента корзины на основе снимка цены
          readOnly: true
        added_at:
          type: string
          format: date-time
          readOnly: true
          title: Дата добавления
      required:
      - added_at
      - id
      - product
      - total_price
      - unit_price
      - variant
      - variant_id
    CartItemCreate:
      type: object
      description: |-
        Serializer для создания элемента корзины.
        Принимает variant_id вместо product_id.
      properties:
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 1
          title: Количество
    CartItemCreateRequest:
      type: object
      description: |-
        Serializer для создания элемента корзины.
        Принимает variant_id вместо product_id.
      properties:
        variant_id:
          type: integer
          writeOnly: true
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 1
          title: Количество
      required:
      - variant_id
    Category:
