    ProductVariant:
      type: object
      description: |-
        Serializer для ProductVariant с роле-ориентированной ценой

        Поля:
        - current_price: цена для текущего пользователя (роле-ориентированная)
        - color_hex: hex-код цвета из ColorMapping
        - is_in_stock: computed property из модели
        - available_quantity: computed property из модели
        - attributes: объединенный список атрибутов (вариант + продукт с наследованием)
      properties:
        id:
          type: integer
          readOnly: true
        sku:
          type: string
          readOnly: true
          title: Артикул SKU
          description: Уникальный артикул варианта
        color_name:
          type: string
          readOnly: true
          title: Цвет
          description: Название цвета из 1С
        size_value:
          type: string
          readOnly: true
          title: Размер
          description: Значение размера
        current_price:
          type: string
          description: |-
            Получить роле-ориентированную цену для текущего пользователя

            Args:
                obj: ProductVariant instance

            Returns:
                str: Цена как строка (сериализация Decimal)
          readOnly: true
        color_hex:
          type:
          - string
          - 'null'
          description: |-
            Получить hex-код цвета из ColorMapping

            Args:
                obj: ProductVariant instance

            Returns:
                str | None: Hex-код цвета или None если маппинг не найден
          readOnly: true
        stock_quantity:
          type: integer
          readOnly: true
          title: Количество на складе
          description: Доступное количество на складе
        is_in_stock:
          type: boolean
          readOnly: true
        available_quantity:
          type: integer
          readOnly: true
        stock_range:
          type:
          - string
          - 'null'
          description: |-
            Получить диапазон остатков (1-5, 6-19, 20-49, 50+)

            Args:
                obj: ProductVariant instance

            Returns:
                str | None: Строка диапазона или None если товара нет
          readOnly: true
        rrp:
          type:
          - string
          - 'null'
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
          title: РРЦ
          description: Рекомендованная розничная цена (информационно)
        msrp:
          type:
          - string
          - 'null'
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
          title: МРЦ
          description: Минимальная рекомендованная розничная цена (информационно)
        main_image:
          type:
          - string
          - 'null'
          description: |-
            Получить URL основного изображения варианта

            Args:
                obj: ProductVariant instance

            Returns:
                str | None: URL изображения или None (относительный путь с /media/)
          readOnly: true
        gallery_images:
          type: array
          items:
            type: string
          description: |-
            Получить список URL галереи изображений варианта

            Пути в gallery_images хранятся как относительные от /media/:
            - /products/variants/... → /media/products/variants/...

            Дубликаты и main_image исключаются из результата.

            Args:
                obj: ProductVariant instance

            Returns:
                list[str]: Список уникальных URL изображений с /media/ префиксом
          readOnly: true
        attributes:
          type: array
          items:
            type: object
            additionalProperties: {}
          description: |-
            Получить атрибуты варианта с наследованием от продукта

            Логика наследования:
            1. Получаем атрибуты продукта
            2. Получаем атрибуты варианта
            3. Объединяем: если вариант имеет значение атрибута,
               оно переопределяет значение продукта
            4. Возвращаем комбинированный список

            Args:
                obj: ProductVariant instance

            Returns:
                list[dict]: Список атрибутов с полями name, value, slug, type
          readOnly: true
      required:
      - attributes
      - available_quantity
      - color_hex
      - color_name
      - current_price
      - gallery_images
      - id
      - is_in_stock
      - main_image
      - msrp
      - rrp
      - size_value
      - sku
      - stock_quantity
      - stock_range
